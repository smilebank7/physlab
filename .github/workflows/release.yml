name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-python:
    name: Build Python package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv venv && uv pip install -e ".[dev]"
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" python -m build
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-pypi:
    name: Publish PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-python
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/physlab
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  build-npm:
    name: Build npm package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - run: cd mcp-server && bun install
      - run: cd mcp-server && bun run build
      - run: cd mcp-server && npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-dist
          path: mcp-server/*.tgz

  publish-npm:
    name: Publish npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-npm
    runs-on: ubuntu-22.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/@physlab/mcp-server
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: npm-dist
          path: npm-dist
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - run: npm publish npm-dist/*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
