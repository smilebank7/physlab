name: Feature request
description: Propose a scoped improvement.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What concrete workflow would this improve?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope fit
      options:
        - v0.1 bug fix or documentation polish
        - v0.2 roadmap candidate
        - Unsure
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link related examples, prior art, or failing commands.

