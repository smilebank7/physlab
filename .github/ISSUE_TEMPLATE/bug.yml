name: Bug report
description: Report reproducible behavior that looks wrong.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, seed values, and relevant files.
      placeholder: |
        uv run python examples/hello_cartpole.py --headless --steps 10
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, package version or commit, and hardware.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the smallest useful output.
      render: text

