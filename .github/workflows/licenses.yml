name: Licenses

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    name: License audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: "1.3.10"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: cd mcp-server && bun install
      - run: python tools/check_licenses.py
        env:
          PATH: ${{ github.workspace }}/.venv/bin:${{ github.workspace }}/mcp-server/node_modules/.bin:${{ env.PATH }}
