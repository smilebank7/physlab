name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, ubuntu-22.04]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: cd mcp-server && bun install
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" ruff check .
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" mypy src/
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" pytest -v --cov=physlab --cov-report=xml
      - run: cd mcp-server && bun test
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml

  license-audit:
    name: License audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: uv venv && uv pip install -e ".[dev]"
      - run: cd mcp-server && bun install
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$GITHUB_WORKSPACE/mcp-server/node_modules/.bin:$PATH" python tools/check_licenses.py
