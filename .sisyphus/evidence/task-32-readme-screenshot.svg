<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="896" viewBox="0 0 1200 896">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect x="20" y="20" width="1160" height="856" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="36" y="68" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"># physlab</text><text x="36" y="92" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="116" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">[![CI](https://github.com/smilebank7/physlab/actions/workflows/ci.yml/badge.svg)](https://github.com/smilebank7/physlab/actions/workflows/ci.yml)</text><text x="36" y="140" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">[![License](https://github.com/smilebank7/physlab/actions/workflows/licenses.yml/badge.svg)](https://github.com/smilebank7/physlab/actions/workflows/licenses.yml)</text><text x="36" y="164" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">[![Cold Start](https://github.com/smilebank7/physlab/actions/workflows/cold-start.yml/badge.svg)](https://github.com/smilebank7/physlab/actions/workflows/cold-start.yml)</text><text x="36" y="188" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">![PyPI](https://img.shields.io/badge/PyPI-planned-lightgrey.svg)</text><text x="36" y="212" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">![npm](https://img.shields.io/badge/npm-planned-lightgrey.svg)</text><text x="36" y="236" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">![Docs](https://img.shields.io/badge/docs-local-blue.svg)</text><text x="36" y="260" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="284" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">Mac-native physical AI experiments with MuJoCo, local reward iteration, and an MCP tool surface.</text><text x="36" y="308" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="332" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">Status: alpha, v0.1 in progress. The current branch has the Franka anchor demo,</text><text x="36" y="356" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">three built-in tasks (`franka_pick`, `ant_stand`, `franka_push`), and CI checks</text><text x="36" y="380" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">for license, backend, workflow, extension, MCP, hardware, and research freedom.</text><text x="36" y="404" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="428" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">## Quick Start</text><text x="36" y="452" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="476" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">From a clone, install the Python package and run the smallest headless episode:</text><text x="36" y="500" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="524" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">```bash</text><text x="36" y="548" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">uv pip install -e &quot;.[dev]&quot;</text><text x="36" y="572" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">uv run python examples/hello_cartpole.py --headless --steps 10</text><text x="36" y="596" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">```</text><text x="36" y="620" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="644" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">The v0.1 release target is `pip install physlab`; until the release is cut, use</text><text x="36" y="668" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">the editable install above. For the longer local anchor replay:</text><text x="36" y="692" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="716" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">```bash</text><text x="36" y="740" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">rm -rf runs/readme-smoke</text><text x="36" y="764" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">uv run python examples/eureka_franka.py --headless --iterations=1 --llm=mock --seed=42 --run-id=readme-smoke</text><text x="36" y="788" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">```</text><text x="36" y="812" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text><text x="36" y="836" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827">## Why This Exists</text><text x="36" y="860" font-family="SFMono-Regular, Menlo, monospace" font-size="15" fill="#111827"></text>
</svg>
