name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-python:
    name: Build Python package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv venv && uv pip install -e ".[dev]"
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" python -m build
      - run: PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH" twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-pypi:
    name: Publish PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-python
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/physlab
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
